<div id="modal-auth" class="modal-login" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
    <div class="modal-contenido" style="background:white; padding:30px; border-radius:8px; width:300px; text-align:center;">
        <button class="btn-cerrar-modal" onclick="document.getElementById('modal-auth').style.display='none'">&times;</button>
        <h3>Iniciar Sesión</h3>
        <form id="form-login-modal">
            <input type="text" id="modal-username" placeholder="Usuario" required style="width:100%; margin:10px 0; padding:8px;">
            <input type="password" id="modal-password" placeholder="Contraseña" required style="width:100%; margin:10px 0; padding:8px;">
            <button type="submit" style="width:100%; padding:10px; background:#2e7d32; color:white; border:none;">Entrar</button>
        </form>
    </div>
</div>
