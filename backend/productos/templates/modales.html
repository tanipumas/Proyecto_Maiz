<div id="modal-auth" class="modal-login">
    <div class="modal-contenido">
        <button class="btn-cerrar-modal" onclick="cerrarModalAutenticacion()">&times;</button>
        <h3>Iniciar Sesión</h3>
        <form id="form-login-modal">
            <input type="text" id="modal-username" placeholder="Usuario" required>
            <input type="password" id="modal-password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</div>
