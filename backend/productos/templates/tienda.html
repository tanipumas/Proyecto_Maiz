{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Insumos Molineros de México</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        .modal-login { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-contenido { background-color: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 350px; position: relative; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'inicio' %}" class="nav-logo">🌾 INSUMOS MOLINEROS</a>
        
        <div style="display: flex; align-items: center; gap: 35px;">
            <ul class="nav-links">
                <li><a href="{% url 'dashboard' %}">Inicio</a></li>
                <li><a href="{% url 'tienda' %}" class="active">Tienda</a></li>
                <li id="menu-privado-perfil" style="display: none;"><a href="{% url 'perfil' %}">Mi Perfil</a></li>
                <li id="menu-privado-carrito" style="display: none;"><a href="{% url 'carrito' %}" class="nav-cart">🛒 Carrito</a></li>
            </ul>
            
            <div id="auth-seccion" style="display: flex; gap: 15px; align-items: center;">
                <button id="btn-nav-login" class="nav-btn">🔐 Iniciar Sesión</button>
                <button id="btn-nav-registro" class="nav-btn" style="background-color: #1565c0;">📝 Registrarse</button>
                
                <div id="nav-usuario-info" style="display: none; align-items: center; gap: 15px;">
                    <span id="nav-nombre-usuario" style="font-weight: bold; color: white;"></span>
                    <button class="nav-btn" onclick="window.cerrarSesionCliente()" style="background-color: #c62828;">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    {% include 'modales.html' %}

    <main class="contenedor-principal" style="padding: 40px 20px;">
        <div id="contenedor-tienda"></div>
    </main>

    <script src="{% static 'app.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Lógica de visibilidad
            const token = localStorage.getItem('cliente_token');
            if (token) {
                document.getElementById('menu-privado-carrito').style.display = 'block';
                document.getElementById('menu-privado-perfil').style.display = 'block';
                document.getElementById('btn-nav-login').style.display = 'none';
                document.getElementById('btn-nav-registro').style.display = 'none'; 
                document.getElementById('nav-usuario-info').style.display = 'flex';
                document.getElementById('nav-nombre-usuario').innerText = localStorage.getItem('usuario_nombre') || "Cliente";
            }

            // Eventos seguros
            document.getElementById('btn-nav-login').addEventListener('click', () => {
                if (window.abrirModalAutenticacion) window.abrirModalAutenticacion();
            });
            document.getElementById('btn-nav-registro').addEventListener('click', () => {
                if (window.abrirModalRegistro) window.abrirModalRegistro();
            });
        });
    </script>
</body>
</html>
